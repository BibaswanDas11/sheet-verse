<!DOCTYPE html>
<html>
<head>
  <title>Sheet Verse</title>

  <!-- Luckysheet -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/css/plugins.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/plugins.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet/dist/css/luckysheet.css" />

  <script src="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/js/plugin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luckysheet/dist/luckysheet.umd.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <span onclick="toggleMenu()">☰</span>
  <span class="title">Sheet Verse</span>
</div>

<!-- Overlay Menu -->
<div id="menu" class="menu" onclick="closeMenu(event)">
  <div class="menu-content" onclick="event.stopPropagation()">

    <h3>Sheet Verse</h3>

    <button onclick="newFile()">New File</button>
    <button onclick="saveLocal()">Save</button>
    <button onclick="renameFile()">Rename</button>

    <hr>

    <button onclick="toggleDark()">Toggle Dark Mode</button>
    <button onclick="showAbout()">About</button>

  </div>
</div>

<!-- About -->
<div id="about" class="overlay" onclick="closeAbout(event)">
  <div class="overlay-content" onclick="event.stopPropagation()">
    <h2>About Sheet Verse</h2>
    <p>Advanced spreadsheet app with Excel-like features.</p>
  </div>
</div>

<!-- Spreadsheet -->
<div id="luckysheet" style="margin:0;padding:0;position:absolute;width:100%;height:100%;top:50px;"></div>

<script src="app.js"></script>
</body>
</html>
